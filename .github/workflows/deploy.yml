name: Deploy Vite App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: album/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: album
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        working-directory: album
        run: pnpm --filter @workspace/financas-legends run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: SPA fallback
        run: cp album/artifacts/financas-legends/dist/public/index.html album/artifacts/financas-legends/dist/public/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: album/artifacts/financas-legends/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
