kind = "web"
previewPath = "/"
title = "Finanças Legends"
version = "1.0.0"
id = "artifacts/financas-legends"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21698

[services.development]
run = "pnpm --filter @workspace/financas-legends run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/financas-legends", "run", "build" ]
publicDir = "artifacts/financas-legends/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21698"
BASE_PATH = "/"
